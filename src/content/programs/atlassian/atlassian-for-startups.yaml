title: Atlassian for Startups
summary: Atlassian's Premium cloud suite (Jira, Confluence, Loom, Bitbucket, and more) free for 12 months for qualifying startups
intro: Eligible startups get Atlassian's Premium suite (Jira, Confluence, Loom, Bitbucket, and more) free for 12 months for up to 50 users.
description: "Atlassian for Startups gives VC-funded or accelerator/incubator-affiliated startups that have raised no more than $10M in external funding free access to Atlassian's Premium cloud products for 12 months for up to 50 users (some products capped at 10 seats). The bundle includes: Jira Premium, Confluence Premium, Loom Business + AI, Jira Service Management, Customer Service Management, Jira Product Discovery Premium, and Bitbucket Premium. The program also includes dedicated Customer Success Manager support and access to the Atlassian Startups Community. Companies must not be existing Atlassian paid customers."
