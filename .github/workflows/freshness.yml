name: Perk freshness check

# Weekly link-health + staleness sweep over all programs. Advisory only: it writes
# reports/data-health.{md,json} and opens/updates ONE review PR. It never edits program
# data or bumps a `verified` date — a maintainer reviews and re-verifies.
on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# One sweep at a time; let an in-progress run finish.
concurrency:
  group: freshness
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run freshness + link-health check
        run: node scripts/check-perk-health.mjs --write
        env:
          STALE_DAYS: "120"
      - name: Open/update the review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/freshness
          base: main
          add-paths: reports/
          commit-message: "chore(data): weekly perk freshness report"
          title: "Data health: weekly perk freshness report"
          body: |
            Automated weekly link-health + staleness sweep. **Advisory** — review and
            re-verify; nothing here changes a `verified` date or publishes on its own.

            See `reports/data-health.md` for broken links, off-domain redirects, and
            records due for re-verification. Close this PR if there's nothing to act on;
            it will be refreshed on the next run.
          labels: data-health, automated
          delete-branch: false
