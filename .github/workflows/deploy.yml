name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Same environment as deploy so the build step can read its variables (e.g.
    # PUBLIC_APOLLO_APP_ID). Astro inlines PUBLIC_* at build time, so the value must
    # be present here, not just in the deploy job.
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
        # Full history so build-time git-date derivation (added/updated) is correct.
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build site (and agent layer + OG images)
        run: bun run build
        env:
          # Apollo company-level visitor tracking. Empty/unset = feature off (the
          # default on forks/PRs that lack this environment variable). Set in the
          # github-pages environment to enable; loads gated (geo + consent) at runtime.
          PUBLIC_APOLLO_APP_ID: ${{ vars.PUBLIC_APOLLO_APP_ID }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
